# Meris Harness 配置模板
# 用法: meris init-harness .  → 复制为 .meris/settings.yaml
# 个人覆盖（不提交 Git）: .meris/settings.local.yaml（深合并到本文件之上）
# 模型路由详见 docs/MODELS.md

# --- 工具权限（bash 支持 glob，deny 优先于 allow）---
permissions:
  allow:
    - Read
    - Edit
    - Write
    - Glob
    - Grep
    - Git
    - Bash(pytest*)
    - Bash(python*)
    - Bash(git status*)
    - Bash(git diff*)
    - Bash(git add*)
    - MCP
  deny:
    - Bash(rm -rf*)
    - Bash(git push*)
    - Bash(curl*)

# --- DoD 传感器：改文件后 / run 结束时自动执行的检查 ---
sensors:
  # write_file / edit_file 后立即跑的 shell 命令
  postEdit: []
  # meris run 结束时是否跑默认验收（如 pytest）
  onComplete: true

# --- 发给 LLM 的上下文预算 ---
context:
  maxMessages: 48
  maxTokens: 32000
  maxToolTokens: 2000

# --- 禁止 agent 读写的路径 glob ---
blockedPaths:
  - "**/generated/**"
  - "**/node_modules/**"

# --- Bash 沙箱（Phase E3）：off | warn | strict ---
sandbox:
  mode: warn
  bashTimeoutSec: 120

# --- 工具钩子（Claude Code 风格，见 README）---
hooks:
  preToolUse: []
  postToolUse: []
  onSave: []
  onCommit: []

# --- MCP 服务（meris mcp list）---
mcpServers: {}

# --- 多模型路由 ---
models:
  # 模型池：每个 profile 只定义一次
  profiles:
    fast:
      provider: deepseek
      model: deepseek-chat
      hint: 只读问答、解释、轻量 plan
    code:
      provider: volcengine
      model: ep-xxxxxxxx
      hint: 改代码、跑测试、实现功能
    heavy:
      provider: anthropic
      model: claude-sonnet-4-20250514
      hint: 大规模重构、架构设计

  # 每个 CLI mode 的策略（ask / plan / run）
  byMode:
    ask:
      profile: fast
    plan:
      profile: fast
    review:
      profile: fast
    run:
      strategy: dynamic
      candidates:
        - fast
        - code
        - heavy
      defaultProfile: fast

  # 任务级静态规则（优先级高于 byMode，第一条命中即停）
  rules:
    - name: heavy-refactor
      match:
        mode: run
        taskContains:
          - 重构
          - refactor
          - 架构
      profile: heavy

  # 运行时按需切换（全局开关 + 路由分类器）
  dynamic:
    enabled: false
    router:
      provider: deepseek
      model: deepseek-chat
    reRoute: onMutation
