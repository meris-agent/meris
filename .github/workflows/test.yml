name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Ruff check
        run: ruff check meris tests

      - name: Harness check
        run: meris harness check --cwd .

      - name: Benchmark mock (offline)
        run: python scripts/run_benchmark_mock.py

      - name: Ratchet status
        run: meris ratchet status --cwd .

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        working-directory: meris-rs
        run: cargo test

      - name: Cargo build release
        working-directory: meris-rs
        run: cargo build --release

      - name: Sandbox check smoke
        run: |
          ./meris-rs/target/release/meris-rs sandbox check \
            --workspace .. \
            --command "pwd" \
            --mode strict | grep -q blocked

      - name: Sandbox allow pytest pattern
        run: |
          ./meris-rs/target/release/meris-rs sandbox check \
            --workspace .. \
            --command 'pytest tests/ -m "not integration" -q' \
            --mode warn | grep -q '"ok"'
