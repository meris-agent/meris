name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-rust:
    name: meris-rs (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo build release
        working-directory: meris-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          ext="${{ matrix.ext }}"
          src="meris-rs/target/${{ matrix.target }}/release/meris-rs${ext}"
          name="meris-rs-${{ matrix.target }}${ext}"
          cp "$src" "$name"
          echo "ARTIFACT=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: meris-rs-${{ matrix.target }}
          path: meris-rs-*

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  release:
    needs: [build-rust, build-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**

      - name: Upload to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          shopt -s globstar nullglob
          files=(artifacts/**/*.whl artifacts/**/*.tar.gz)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No wheel/sdist in artifacts/"
            exit 1
          fi
          python -m twine upload "${files[@]}"
